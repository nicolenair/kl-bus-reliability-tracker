version: 2

models:
  - name: stg_stop_times_mrtfeeder
    description: >
      Staging model for stop times from the MRT feeder GTFS feed. 
      Each row represents a scheduled arrival and departure at a stop for a given trip.
    columns:
      - name: trip_id
        description: Identifier of the trip this stop time belongs to.
      - name: stop_id
        description: Identifier of the stop where the vehicle arrives/departs.
      - name: stop_sequence
        description: Order of stops for a particular trip. Values must increase along the trip but do not need to be consecutive.
      - name: stop_headsign
        description: Text that appears on signage identifying the trip's destination to passengers at this stop. Overrides the trip-level headsign if provided.
      - name: arrival_time
        description: Scheduled arrival time at the stop for this trip.
      - name: departure_time
        description: Scheduled departure time from the stop for this trip.

  - name: stg_stop_times
    description: >
      Staging model for stop times from the main GTFS feed.
      Each row represents a scheduled arrival and departure at a stop for a given trip.
    columns:
      - name: trip_id
        description: Identifier of the trip this stop time belongs to.
      - name: stop_id
        description: Identifier of the stop where the vehicle arrives/departs.
      - name: stop_sequence
        description: Order of stops for a particular trip. Values must increase along the trip but do not need to be consecutive.
      - name: stop_headsign
        description: Text that appears on signage identifying the trip's destination to passengers at this stop. Overrides the trip-level headsign if provided.
      - name: arrival_time
        description: Scheduled arrival time at the stop for this trip.
      - name: departure_time
        description: Scheduled departure time from the stop for this trip.

  - name: stg_stops_mrtfeeder
    description: >
      Staging model for stops from the MRT feeder GTFS feed.
      Each row represents a physical stop or station where passengers board or alight.
    columns:
      - name: stop_id
        description: Unique identifier for the stop.
      - name: stop_name
        description: Human-readable name of the stop or station.
      - name: stop_lat
        description: Latitude of the stop location in WGS 84 decimal degrees.
      - name: stop_lon
        description: Longitude of the stop location in WGS 84 decimal degrees.

  - name: stg_stops
    description: >
      Staging model for stops from the main GTFS feed.
      Each row represents a physical stop or station where passengers board or alight.
    columns:
      - name: stop_id
        description: Unique identifier for the stop.
      - name: stop_name
        description: Human-readable name of the stop or station.
      - name: stop_lat
        description: Latitude of the stop location in WGS 84 decimal degrees.
      - name: stop_lon
        description: Longitude of the stop location in WGS 84 decimal degrees.

  - name: stg_vehicle_positions
    description: >
      Staging model for real-time vehicle positions ingested from the GTFS-RT dump (rtdump).
      Incrementally loaded using a merge strategy, deduped on (position_timestamp, trip_id).
      Timestamps are converted from Unix epoch to UTC and localised to Asia/Kuala_Lumpur.
    columns:
      - name: position_timestamp
        description: UTC timestamp of the vehicle position report, cast from the raw Unix epoch integer.
      - name: position_date
        description: Calendar date of the position report in the Asia/Kuala_Lumpur timezone (used as a partition/filter helper).
      - name: actual_arrival_time
        description: Localised datetime of the position report in Asia/Kuala_Lumpur timezone.
      - name: trip_id
        description: Identifier of the GTFS trip the vehicle is currently serving.
      - name: route_id
        description: Identifier of the GTFS route associated with the trip.
      - name: latitude
        description: Current latitude of the vehicle in WGS 84 decimal degrees.
      - name: longitude
        description: Current longitude of the vehicle in WGS 84 decimal degrees.
      - name: bearing
        description: Direction the vehicle is travelling, in degrees clockwise from north (0–360).
      - name: speed
        description: Current speed of the vehicle in metres per second as reported by the GTFS-RT feed.
      - name: vehicle_id
        description: Unique identifier for the physical vehicle.
      - name: vehicle_license_plate
        description: License plate number of the vehicle.